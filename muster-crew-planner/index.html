<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crew Leave Planner — M/Y Renaissance</title>
<style>
  :root{
    --navy:#0b2138; --navy2:#13314f; --steel:#1d4567; --ink:#0a1722;
    --gold:#c9a24b; --gold2:#e3c573;
    --bg:#f4f6f9; --card:#ffffff; --line:#e2e8f0; --muted:#64748b; --text:#1e293b;
    --bridge:#b8902f; --deck:#2e7dd1; --engine:#e0792a; --interior:#7c4dc9; --galley:#cf3b6b;
    --c-onboard:#cfe6d2; --l-onboard:#3a9d56;
    --c-leave:#f6d9a3;   --l-leave:#d99a2b;
    --c-travel:#cdd9ef;  --l-travel:#4f6fb5;
    --c-sick:#f3c0c0;    --l-sick:#cf3b3b;
    --c-unpaid:#dcd6ec;  --l-unpaid:#7c6bb0;
    --c-payroll:#dbe0e6; --l-payroll:#7b8794;
    --c-comp:#f6c9dd;    --l-comp:#c44e86;
    --c-biz:#c4e8de;     --l-biz:#1aa37a;
    --blackout:#c0322f; --mv-in:#2f9e63; --mv-out:#d98324;
    --shadow:0 1px 3px rgba(15,30,50,.08),0 8px 24px rgba(15,30,50,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  .hidden{display:none!important}

  #login{position:fixed;inset:0;background:linear-gradient(160deg,var(--navy),var(--ink));display:flex;align-items:center;justify-content:center;z-index:100}
  .login-card{background:var(--card);border-radius:16px;padding:38px 40px;width:440px;max-width:92vw;box-shadow:0 30px 80px rgba(0,0,0,.5);text-align:center}
  .crest{font-size:30px;color:var(--gold);letter-spacing:3px}
  .login-card h1{margin:6px 0 2px;font-size:21px;color:var(--navy)}
  .login-card .sub{color:var(--muted);font-size:12.5px;margin-bottom:24px;letter-spacing:.5px;text-transform:uppercase}
  .login-card label{display:block;text-align:left;font-size:12px;color:var(--muted);margin:14px 0 5px;font-weight:600}
  .login-card select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;background:#fff}
  .login-card button.go{margin-top:24px;width:100%;background:var(--navy);color:#fff;border:none;padding:13px;border-radius:9px;font-size:15px;font-weight:600;transition:.15s}
  .login-card button.go:hover{background:var(--steel)}
  .login-hint{margin-top:16px;font-size:11.5px;color:var(--muted);line-height:1.5}

  header.top{background:var(--navy);color:#fff;display:flex;align-items:center;gap:16px;padding:0 20px;height:58px;position:sticky;top:0;z-index:40;box-shadow:0 2px 10px rgba(0,0,0,.15)}
  header .brand{font-weight:700;letter-spacing:.5px;font-size:15px;display:flex;align-items:center;gap:9px;white-space:nowrap}
  header .brand .dot{color:var(--gold);font-size:18px}
  nav.tabs{display:flex;gap:2px;margin-left:10px;flex:1;flex-wrap:wrap}
  nav.tabs button{background:transparent;color:#cdd9e8;border:none;padding:9px 14px;border-radius:8px;font-size:13.5px;font-weight:500}
  nav.tabs button:hover{background:rgba(255,255,255,.08);color:#fff}
  nav.tabs button.active{background:var(--steel);color:#fff}
  .who{display:flex;align-items:center;gap:10px;font-size:12.5px;white-space:nowrap}
  .who .pill{background:var(--steel);padding:5px 11px;border-radius:20px;font-weight:600}
  .who .role{color:var(--gold2);font-weight:700}
  .who button{background:transparent;border:1px solid rgba(255,255,255,.25);color:#cdd9e8;padding:5px 10px;border-radius:7px;font-size:12px}
  .who button:hover{border-color:var(--gold);color:#fff}

  main{padding:22px 24px 60px;max-width:1560px;margin:0 auto}
  h2.page{font-size:19px;margin:0 0 4px;color:var(--navy)}
  .page-sub{color:var(--muted);margin:0 0 20px;font-size:13px;line-height:1.5}

  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;box-shadow:var(--shadow)}
  .pad{padding:18px 20px}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .kpi .lab{font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:600}
  .kpi .val{font-size:29px;font-weight:700;color:var(--navy);margin-top:4px;line-height:1}
  .kpi .meta{font-size:12px;color:var(--muted);margin-top:5px}
  .kpi .bar{position:absolute;left:0;top:0;bottom:0;width:4px}

  .toolbar{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  .toolbar .spacer{flex:1}
  .filter-chip{border:1px solid var(--line);background:#fff;padding:7px 12px;border-radius:20px;font-size:12.5px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:6px}
  .filter-chip .sw{width:10px;height:10px;border-radius:50%}
  .filter-chip.off{opacity:.4}
  select.inp,input.inp{padding:8px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff}

  .legend{display:flex;gap:14px 16px;flex-wrap:wrap;font-size:12px;color:var(--muted);align-items:center}
  .legend .it{display:flex;align-items:center;gap:6px}
  .legend .box{width:16px;height:12px;border-radius:3px;border:1px solid rgba(0,0,0,.12)}
  .legend .box.hatch{background:repeating-linear-gradient(45deg,#e7b6b4,#e7b6b4 3px,#f3d6d5 3px,#f3d6d5 6px);border-color:var(--blackout)}

  .gantt-wrap{overflow-x:auto;border-radius:13px}
  table.gantt{border-collapse:collapse;width:100%;min-width:1180px;font-size:12.5px}
  table.gantt th,table.gantt td{padding:0;border:1px solid #eef1f5}
  table.gantt thead th{background:var(--navy);color:#fff;font-weight:600;position:sticky;top:58px;z-index:5}
  table.gantt thead th.namecol{text-align:left;padding:8px 6px 8px 14px;min-width:215px;left:0;z-index:7}
  .monthaxis{position:relative;height:30px}
  .month-lbl{position:absolute;top:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#cdd9e8;border-left:1px solid rgba(255,255,255,.18)}
  .deptrow td{background:linear-gradient(90deg,var(--navy2),transparent);color:#fff;font-weight:700;padding:6px 14px;font-size:12px;letter-spacing:.5px}
  .deptrow td .cnt{opacity:.7;font-weight:500;margin-left:8px;font-size:11px}
  td.namecol{position:sticky;left:0;background:#fff;z-index:3;text-align:left;padding:7px 10px 7px 14px;border-right:2px solid var(--line)}
  td.namecol .nm{font-weight:600;color:var(--navy);font-size:12.5px}
  td.namecol .rk{font-size:11px;color:var(--muted)}
  tr.crewrow:hover td{background:#f8fafc}
  tr.crewrow:hover td.namecol{background:#f1f5f9}
  .rowcanvas{position:relative;height:38px}
  .itin-band{position:relative;height:30px;background:#fbfcfe}
  .seg{position:absolute;top:8px;bottom:8px;border-radius:4px;cursor:pointer;z-index:2}
  .leg-band{position:absolute;top:5px;bottom:5px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10.5px;color:#fff;white-space:nowrap;overflow:hidden;padding:0 6px;z-index:2;cursor:default}
  .mgrid{position:absolute;top:0;bottom:0;width:1px;background:#eef1f5;z-index:1}
  .lockout{position:absolute;top:0;bottom:0;z-index:3;pointer-events:none;background:repeating-linear-gradient(45deg,rgba(192,50,47,.22),rgba(192,50,47,.22) 4px,rgba(192,50,47,.06) 4px,rgba(192,50,47,.06) 8px);border-left:1px dashed rgba(192,50,47,.6);border-right:1px dashed rgba(192,50,47,.6)}
  .lockout.lbl{display:flex;align-items:flex-start;justify-content:center}
  .lockout.lbl span{background:var(--blackout);color:#fff;font-size:9px;padding:1px 5px;border-radius:0 0 4px 4px;font-weight:600}
  .todayline{position:absolute;top:0;bottom:0;width:2px;background:var(--gold);z-index:6}

  table.data{border-collapse:collapse;width:100%;font-size:13px}
  table.data th{background:#f1f5f9;text-align:left;padding:10px 12px;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border-bottom:2px solid var(--line);cursor:pointer;user-select:none}
  table.data th:hover{color:var(--navy)}
  table.data td{padding:9px 12px;border-bottom:1px solid #eef1f5}
  table.data tr.clk:hover td{background:#f8fafc;cursor:pointer}
  .tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
  .tag .sw{width:8px;height:8px;border-radius:50%}
  .balbar{height:7px;border-radius:4px;background:#eef2f7;overflow:hidden;min-width:90px;margin-top:4px}
  .balbar > i{display:block;height:100%;border-radius:4px}
  .statusdot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle}

  .overlay{position:fixed;inset:0;background:rgba(8,18,30,.55);display:flex;align-items:center;justify-content:center;z-index:80;padding:20px}
  .modal{background:#fff;border-radius:15px;width:600px;max-width:96vw;max-height:90vh;overflow:auto;box-shadow:0 30px 80px rgba(0,0,0,.4)}
  .modal .mhead{background:var(--navy);color:#fff;padding:18px 22px;display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;z-index:2}
  .modal .mhead h3{margin:0;font-size:18px}
  .modal .mhead .rk{color:#bcd0e6;font-size:13px;margin-top:2px}
  .modal .mhead .x{background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:8px;font-size:18px}
  .modal .mbody{padding:22px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
  .stat{background:#f7f9fc;border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .stat .l{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600}
  .stat .v{font-size:20px;font-weight:700;color:var(--navy);margin-top:3px}
  .mini-tl{margin-top:6px}
  .mini-tl .row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f0f3f7;font-size:12.5px}
  .mini-tl .row .when{color:var(--muted);min-width:150px}
  .mini-tl .row .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:600;margin-bottom:5px}
  .field input,.field select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;background:#fff}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .btn{border:none;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:600}
  .btn.primary{background:var(--navy);color:#fff}
  .btn.primary:hover{background:var(--steel)}
  .btn.ghost{background:#eef2f7;color:var(--navy)}
  .btn.danger{background:#fbe4e3;color:#a32a27}
  .btn.sm{padding:6px 11px;font-size:12px}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .notice{background:#fff7e6;border:1px solid #f0d79a;color:#8a6516;border-radius:9px;padding:10px 13px;font-size:12.5px;margin-top:14px}
  .notice.red{background:#fdeceb;border-color:#f0bbb8;color:#a32a27}
  .badge-lock{display:inline-flex;align-items:center;gap:5px;background:#fdeceb;color:#a32a27;border:1px solid #f0bbb8;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}

  .warnrow{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #eef1f5;font-size:13px}
  .warnrow:last-child{border-bottom:none}
  .sev{width:9px;height:9px;border-radius:50%;flex:none}
  .footnote{color:var(--muted);font-size:11.5px;margin-top:8px;line-height:1.5}
  .sechead{display:flex;align-items:center;justify-content:space-between;margin:0 0 12px}
  .sechead h3{margin:0;color:var(--navy);font-size:15px}
  @media(max-width:700px){nav.tabs{display:none}}
  /* movements dashboard */
  .dash-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .ctl{display:flex;align-items:center;gap:7px;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:600}
  .ctl select{text-transform:none;letter-spacing:normal;font-weight:500}
  .ctl-lbl{font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:600;margin-right:2px}
  .period-nav{display:flex;align-items:center;gap:4px;background:#f1f5f9;border:1px solid var(--line);border-radius:9px;padding:3px 5px}
  .navbtn{border:none;background:transparent;color:var(--navy);font-size:18px;line-height:1;width:28px;height:28px;border-radius:7px;font-weight:700}
  .navbtn:hover{background:#e2e8f0}
  .period-lbl{min-width:172px;text-align:center;font-weight:700;color:var(--navy);font-size:13px}
  .mv-card{overflow:hidden;padding:0}
  .mv-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);background:#fbfcfe;font-weight:700;color:var(--navy);font-size:14px;gap:12px;flex-wrap:wrap}
  .mv-head-count{font-weight:600;color:var(--muted);font-size:12.5px}
  .mv-scroll{max-height:60vh;overflow:auto}
  table.mvtable{border-collapse:collapse;width:100%;font-size:13px}
  table.mvtable.detail{min-width:1260px}
  table.mvtable thead th{position:sticky;top:0;z-index:3;background:var(--navy);color:#fff;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;font-weight:600;padding:9px 12px;white-space:nowrap}
  table.mvtable td{padding:9px 12px;border-bottom:1px solid #f0f3f7;white-space:nowrap;vertical-align:middle}
  tr.mv-day-row td{position:sticky;top:34px;z-index:2;background:#eef2f7;font-weight:700;color:var(--navy);text-transform:uppercase;font-size:11px;letter-spacing:.4px;padding:6px 12px;border-bottom:1px solid var(--line)}
  tr.mv-day-row.today td{background:#fff7e6}
  tr.mv-day-row .dc{float:right;font-weight:600;text-transform:none}
  tr.mv-day-row .cin{color:var(--mv-in);margin-left:12px}
  tr.mv-day-row .cout{color:var(--mv-out);margin-left:12px}
  tr.mvr:hover td{background:#f8fafc;cursor:pointer}
  .mv-dir{font-size:11px;text-align:center}
  tr.mvr.in .mv-dir{color:var(--mv-in)}
  tr.mvr.out .mv-dir{color:var(--mv-out)}
  .mv-time{font-weight:700;color:var(--navy);font-variant-numeric:tabular-nums}
  .mv-name{color:var(--navy);font-weight:600;line-height:1.25;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .flagimg{height:13px;width:auto;border-radius:2px;box-shadow:0 0 0 1px rgba(0,0,0,.12);vertical-align:middle}
  .nat-code{font-size:10px;font-weight:700;color:var(--muted);background:#eef2f7;border-radius:5px;padding:1px 5px;letter-spacing:.3px}
  .mv-rank{font-size:11px;color:var(--muted);line-height:1.2;margin-top:2px;display:flex;align-items:center}
  .ddot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
  .mv-route{max-width:300px;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
  .mv-flight{font-size:11.5px;font-weight:700;color:var(--steel)}
  .mv-pu{font-size:12.5px;color:var(--mv-out);font-weight:700;font-variant-numeric:tabular-nums}
  .mv-dim{color:#b6c0cc}
  .mv-notes{max-width:220px;overflow:hidden;text-overflow:ellipsis;color:var(--muted);font-size:12px}
  .imm-badge{display:inline-flex;align-items:center;gap:5px;background:#fdeceb;color:#a32a27;border:1px solid #f0bbb8;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
  .pill-ok{display:inline-flex;align-items:center;gap:4px;background:#e7f5ee;color:#1a7a4d;border:1px solid #b9e2cc;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
  .pill-warn{display:inline-flex;align-items:center;background:#fff3df;color:#9a5b12;border:1px solid #f0d29a;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
  .pill-red{display:inline-flex;align-items:center;gap:4px;background:#fdeceb;color:#a32a27;border:1px solid #f0bbb8;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
  .ackcell{cursor:pointer}
  .ackcell:hover{box-shadow:0 0 0 2px rgba(0,0,0,.06)}
  .pill-tbc{display:inline-flex;align-items:center;background:#f3f5f8;color:#7b8794;border:1px solid #e2e8f0;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
  .fstat{display:inline-flex;align-items:center;gap:6px;color:#7b8794;font-size:12px;font-weight:600}
  .fdot{width:8px;height:8px;border-radius:50%;background:#c2cad4;box-shadow:0 0 0 3px #eef2f7}
  .mv-empty{padding:38px;text-align:center;color:var(--muted)}
  @media(max-width:1024px){table.mvtable .col-route,table.mvtable .col-fs{display:none}}
  @media(max-width:1180px){table.mvtable .col-hotel{display:none}}
  @media(max-width:760px){table.mvtable .col-td,table.mvtable .col-imm,table.mvtable .col-pu{display:none}}

  .subnav{display:flex;gap:8px;margin-bottom:16px;border-bottom:1px solid var(--line)}
  .subtab{border:none;background:transparent;padding:10px 16px;border-radius:9px 9px 0 0;font-size:14px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:8px;border-bottom:3px solid transparent;margin-bottom:-1px}
  .subtab:hover{color:var(--navy);background:#f1f5f9}
  .subtab.active{color:var(--navy);border-bottom-color:var(--navy);background:#fbfcfe}
  .subtab .cnt{background:#eef2f7;color:var(--steel);font-size:11px;font-weight:700;border-radius:20px;padding:1px 8px}
  .subtab.active .cnt{background:var(--navy);color:#fff}
  .svc{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid;white-space:nowrap}
  /* ---- login crew picker ---- */
  #crewPickWrap{margin-top:6px}
  .navbadge{display:none;align-items:center;justify-content:center;background:var(--gold);color:#3a2a00;font-size:10px;font-weight:800;border-radius:20px;padding:0 6px;min-width:16px;height:16px;margin-left:4px}
  body.crewmode main{padding-top:18px}
  /* ---- phone app ---- */
  .crewwrap{max-width:432px;margin:0 auto}
  .phone{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:0 18px 50px rgba(15,30,50,.16);overflow:hidden}
  .phone-hd{color:#fff;padding:22px 20px 20px}
  .avatar{width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;letter-spacing:.5px;margin-bottom:10px}
  .ph-name{font-size:20px;font-weight:700;line-height:1.1}
  .ph-sub{font-size:13px;color:#dbe6f2;margin-top:3px;display:flex;align-items:center;gap:6px}
  .ph-sub .flagimg{height:12px}
  .crew-body{padding:16px 16px 20px;min-height:360px;background:#f7f9fc}
  .crew-nav{display:flex;border-top:1px solid var(--line);background:#fff}
  .crew-nav button{flex:1;border:none;background:transparent;padding:9px 4px 8px;font-size:11px;font-weight:600;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;border-top:2px solid transparent;margin-top:-1px}
  .crew-nav button .ci{font-size:17px}
  .crew-nav button.active{color:var(--navy);border-top-color:var(--gold)}
  .crew-foot{text-align:center;color:var(--muted);font-size:11px;margin:14px auto 0;max-width:380px;line-height:1.5}
  .cv-h{margin:2px 0 12px;font-size:16px;color:var(--navy)}
  .cv-sub{margin:18px 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700}
  .cv-note,.cv-line{font-size:12.5px;color:var(--muted);margin-bottom:10px}
  .cv-line b{color:var(--navy)}
  .cv-empty{background:#fff;border:1px dashed var(--line);border-radius:12px;padding:24px;text-align:center;color:var(--muted);font-size:13px}

function buildCrew(){
  CREW=DATA.crew.map((c,i)=>{
    const events=(c.events||[]).filter(e=>CODES[e.code]).map(e=>({code:e.code,...CODES[e.code],start:D(e.start),end:D(e.end)}));
    return {...c,id:i+1,deptKey:c.dept,events};
  });
}
function statusOn(c,date=TODAY){const t=date.getTime();for(const e of c.events){if(t>=e.start.getTime()&&t<=e.end.getTime())return e.cat;}return 'onboard';}
function leaveDaysTaken(c,upto=TODAY){let d=0;for(const e of c.events){if(e.cat!=='leave')continue;const end=Math.min(e.end.getTime(),upto.getTime());if(end>=e.start.getTime())d+=Math.round((end-e.start.getTime())/MS)+1;}return d;}
function nextLeave(c){const f=c.events.filter(e=>e.cat==='leave'&&e.start.getTime()>TODAY.getTime()).sort((a,b)=>a.start-b.start);return f.length?f[0].start:null;}
function returnDate(c){if(statusOn(c)==='onboard')return null;const cur=c.events.filter(e=>e.start.getTime()<=TODAY.getTime()&&e.end.getTime()>=TODAY.getTime()).sort((a,b)=>b.end-a.end)[0];return cur?new Date(cur.end.getTime()+MS):null;}
// leave/travel events that fall inside a blackout window
function lockoutConflicts(c){
  const out=[];
  for(const e of c.events){ if(e.cat!=='leave'&&e.cat!=='travel')continue;
    for(const lo of LOCKOUTS){ if(overlaps(e.start.getTime(),e.end.getTime(),D(lo.start).getTime(),D(lo.end).getTime())){out.push({e,lo});break;} } }
  return out;
}

function pctX(d){return clamp(dayOfYear(d),0,YEAR_DAYS)/YEAR_DAYS*100;}
function monthAxis(){let s='';for(let m=0;m<12;m++){const left=pctX(new Date(YEAR,m,1));const w=pctX(new Date(YEAR,m+1,1))-left;s+=`<div class="month-lbl" style="left:${left}%;width:${w}%">${MONTHS[m]}</div>`;}return s;}
function monthGrid(){let s='';for(let m=1;m<12;m++){s+=`<div class="mgrid" style="left:${pctX(new Date(YEAR,m,1))}%"></div>`;}return s;}
function lockoutBands(withLabel){
  let s='';
  for(const lo of LOCKOUTS){const L=pctX(D(lo.start));const W=pctX(new Date(D(lo.end).getTime()+MS))-L;
    s+=`<div class="lockout${withLabel?' lbl':''}" title="Blackout: ${lo.label} (${fmtShort(D(lo.start))}–${fmtShort(D(lo.end))})" style="left:${L}%;width:${Math.max(W,0.4)}%">${withLabel?`<span>&#128274; ${lo.label}</span>`:''}</div>`;}
  return s;
}

function periodLabel(){
  const {s,e}=periodBounds();
  if(DASH.mode==='week') return s.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' – '+e.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  return DASH.anchor.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
}
function inPeriod(m){const {s,e}=periodBounds();const d=D(m.date).getTime();return d>=s.getTime()&&d<=e.getTime();}
function countBetween(s,e,dir){return MOVES.filter(m=>{const d=D(m.date).getTime();return d>=s.getTime()&&d<=e.getTime()&&(dir?m.dir===dir:true);}).length;}
function dashMoves(){
  const q=DASH.q.toLowerCase().trim();
  return MOVES.filter(m=>inPeriod(m)
    && (DASH.dir==='all'||m.dir===DASH.dir)
    && DASH.depts.has(m.dept)
    && (!q || m.name.toLowerCase().includes(q) || (m.rank||'').toLowerCase().includes(q) || (m.from||'').toLowerCase().includes(q) || (m.to||'').toLowerCase().includes(q)));
}
function renderDash(){
  const t=TODAY.getTime();
  const todayMv=MOVES.filter(m=>D(m.date).getTime()===t);
  const wk=startOfWeek(TODAY), wkEnd=new Date(wk.getFullYear(),wk.getMonth(),wk.getDate()+6);
  const moS=new Date(TODAY.getFullYear(),TODAY.getMonth(),1), moE=new Date(TODAY.getFullYear(),TODAY.getMonth()+1,0);
  const onboard=CREW.filter(c=>statusOn(c)==='onboard').length;
  let h=`<h2 class="page">M/Y Renaissance &mdash; Live Dashboard</h2>`;
  h+=`<div class="kpis">
    ${kpi('Today',todayMv.length,todayMv.filter(m=>m.dir==='in').length+' arriving &middot; '+todayMv.filter(m=>m.dir==='out').length+' departing','var(--gold)')}
    ${kpi('This Week',countBetween(wk,wkEnd),countBetween(wk,wkEnd,'in')+' in &middot; '+countBetween(wk,wkEnd,'out')+' out','var(--mv-in)')}
    ${kpi('This Month',countBetween(moS,moE),countBetween(moS,moE,'in')+' in &middot; '+countBetween(moS,moE,'out')+' out','var(--mv-out)')}
    ${kpi('Onboard Now',onboard,Math.round(onboard/CREW.length*100)+'% of complement','var(--l-onboard)')}
  </div>`;
  h+=`<div class="card pad" style="margin-bottom:14px">
    <div class="dash-toolbar">
      <label class="ctl"><span>View</span>
        <select class="inp" onchange="setMode(this.value)">
          <option value="week" ${DASH.mode==='week'?'selected':''}>Weekly</option>
          <option value="month" ${DASH.mode==='month'?'selected':''}>Monthly</option>
        </select></label>
      <div class="period-nav">
        <button class="navbtn" onclick="shiftPeriod(-1)" title="Previous">&#8249;</button>
        <span class="period-lbl">${periodLabel()}</span>
        <button class="navbtn" onclick="shiftPeriod(1)" title="Next">&#8250;</button>
      </div>
      <button class="btn ghost sm" onclick="resetPeriod()">Today</button>
      <label class="ctl"><span>Show</span>
        <select class="inp" onchange="setDir(this.value)">
          <option value="all" ${DASH.dir==='all'?'selected':''}>All movements</option>
          <option value="in" ${DASH.dir==='in'?'selected':''}>Arrivals only</option>
          <option value="out" ${DASH.dir==='out'?'selected':''}>Departures only</option>
        </select></label>
      <div class="spacer"></div>
      <input class="inp" placeholder="Search name or port…" value="${DASH.q}" oninput="dashSearch(this.value)" style="width:210px">
    </div>
    <div class="dash-toolbar" style="margin-top:10px;gap:7px"><span class="ctl-lbl">Departments</span>${DEPT_ORDER.map(d=>`<button class="filter-chip ${DASH.depts.has(d)?'':'off'}" onclick="dashDept('${d}')"><span class="sw" style="background:${DEPTS[d].raw}"></span>${DEPTS[d].name}</button>`).join('')}</div>
  </div>`;
  const moves=dashMoves();
  const pin=moves.filter(m=>m.dir==='in').length, pout=moves.filter(m=>m.dir==='out').length;
  const unread=moves.filter(m=>docStatus(m)==='sent').length;
  h+=`<div class="card mv-card"><div class="mv-head"><span>${DASH.mode==='week'?'Week of ':''}${periodLabel()}</span><span class="mv-head-count">${moves.length} movement${moves.length!==1?'s':''} &middot; <span style="color:var(--mv-in);font-weight:700">&#9660; ${pin} arriving</span> &middot; <span style="color:var(--mv-out);font-weight:700">&#9650; ${pout} departing</span>${unread?` &middot; <span style="color:#c0322f;font-weight:700">&#9679; ${unread} docs unread</span>`:''}</span></div>${periodItinRibbon()}<div class="mv-scroll"><table class="mvtable"><thead><tr><th style="width:24px"></th><th style="width:74px">Flight Time</th><th>Crew</th><th class="col-route">Route</th><th class="col-td" style="width:104px">Travel Docs</th><th class="col-hotel" style="width:96px">Hotel</th><th class="col-imm" style="width:104px">Immigration</th><th class="col-fs" style="width:116px">Flight Status</th><th class="col-pu" style="width:86px">Pickup</th></tr></thead><tbody>`;
  if(!moves.length){h+=`<tr><td colspan="9" class="mv-empty">No crew movements in this ${DASH.mode==='week'?'week':'month'}.</td></tr>`;}
  else{
    let last=null;
    for(const m of moves){
      if(m.date!==last){last=m.date;const day=D(m.date),dl=moves.filter(x=>x.date===m.date);const ic=dl.filter(x=>x.dir==='in').length,oc=dl.filter(x=>x.dir==='out').length;const isT=day.getTime()===t;
        h+=`<tr class="mv-day-row${isT?' today':''}"><td colspan="9">${day.toLocaleDateString('en-GB',{weekday:'long',day:'2-digit',month:'short'})}${isT?' &middot; TODAY':''}<span class="dc">${ic?`<span class="cin">&#9660; ${ic} in</span>`:''}${oc?`<span class="cout">&#9650; ${oc} out</span>`:''}</span></td></tr>`;}
      h+=mvRow(m);
    }
  }
  h+=`</tbody></table></div></div>`;
  h+=`<p class="footnote">Rows are colour-coded by department. Travel Docs shows crew acknowledgement — red until the crew member confirms (green ✓); click to toggle in this demo. Flight Status will populate from a live feed once connected. ${MOVES.length} flights logged.</p>`;
  document.getElementById('view').innerHTML=h;
}
function mvRow(m){
  const c=findCrewByName(m.name);
  const click=c?`onclick="openCrew(${c.id})"`:'';
  const dirIcon=m.dir==='in'?'&#9660;':'&#9650;';
  const route=(m.from||'?')+' &rarr; '+(m.to||'?');
  const td=docCell(m);
  const imm=m.immReq?'<span class="imm-badge">&#128711; Required</span>':'<span class="mv-dim">Not required</span>';
  const hsv=hotelStatus(m);
  const hotel=hsv==='booked'?'<span class="pill-ok">&#10003; Booked</span>':hsv==='required'?'<span class="pill-warn">Required</span>':'<span class="mv-dim">N/A</span>';
  const pu=m.dir==='out'?(m.pickup?`<span class="mv-pu">${m.pickup}</span>`:'<span class="pill-tbc">TBC</span>'):'<span class="mv-dim">—</span>';
  return `<tr class="mvr ${m.dir}" ${click}>
    <td class="mv-dir" style="box-shadow:inset 4px 0 0 ${depColor(m.dept)}" title="${m.dept}">${dirIcon}</td>
    <td class="mv-time">${m.time||'—'}</td>
    <td><div class="mv-name">${m.name} ${natCell(m.nat)}</div><div class="mv-rank"><span class="ddot" style="background:${depColor(m.dept)}"></span>${m.rank||''} &middot; ${m.dept}</div></td>
    <td class="mv-route col-route">${route}</td>
    <td class="col-td">${td}</td>
    <td class="col-hotel">${hotel}</td>
    <td class="col-imm">${imm}</td>
    <td class="col-fs"><span class="fstat"><span class="fdot"></span>Scheduled</span></td>
    <td class="col-pu">${pu}</td>
  </tr>`;
}
function setMode(v){DASH.mode=v;DASH.anchor=new Date(TODAY.getTime());renderDash();}
function setDir(v){DASH.dir=v;renderDash();}
function shiftPeriod(n){if(DASH.mode==='week')DASH.anchor.setDate(DASH.anchor.getDate()+7*n);else DASH.anchor.setMonth(DASH.anchor.getMonth()+n);renderDash();}
function resetPeriod(){DASH.anchor=new Date(TODAY.getTime());renderDash();}
function dashDept(d){DASH.depts.has(d)?DASH.depts.delete(d):DASH.depts.add(d);renderDash();}
function dashSearch(v){DASH.q=v;renderDash();}

/* ---- CREW MOVEMENTS: flights + transfers + hotels ---- */
let MVF={view:'flights',scope:'upcoming',dir:'all',type:'all',depts:new Set(DEPT_ORDER),q:""};
const CREWINFO=(function(){const m={};(MOVES||[]).forEach(x=>{const k=normName(x.name);if(!m[k])m[k]={dept:x.dept,nat:x.nat};});CREW.forEach(c=>{const k=normName(c.name);if(!m[k])m[k]={dept:c.deptKey,nat:''};});return m;})();
function infoFor(name){return CREWINFO[normName(name)]||null;}
const SVC={ARR:["Arrival","#2f9e63"],DEP:["Departure","#d98324"],IMMIGRATION:["Immigration","#c0322f"],MEDICAL:["Medical","#7c4dc9"],TRF:["Transfer","#1d4567"]};
function svcBadge(s){const k=SVC[s];const c=k?k[1]:"#7b8794";const lbl=k?k[0]:(s||"—");return `<span class="svc" style="background:${c}1a;color:${c};border-color:${c}55">${lbl}</span>`;}
function inScope(iso){const t=TODAY.getTime(),d=D(iso).getTime();if(MVF.scope==='upcoming')return d>=t;if(MVF.scope==='past')return d<t;return true;}
function crewMini(name,nat){const info=infoFor(name);const col=info?depColor(info.dept):'#8a94a6';const flag=(nat||(info&&info.nat))?natCell(nat||info.nat):'';return `<div class="mv-name">${name} ${flag}</div><div class="mv-rank"><span class="ddot" style="background:${col}"></span>${info?info.dept:'<span class="mv-dim">—</span>'}</div>`;}

function renderMovements(){
  let h=`<h2 class="page">Crew Movements</h2><p class="page-sub">Flights, ground transfers and shoreside hotels — switch view below.</p>`;
  h+=`<div class="subnav">
    ${subBtn('flights','&#9992; Flights',MOVES.length)}
    ${subBtn('transfers','&#128666; Ground Transfers',LOGI.transfers.length)}
    ${subBtn('hotels','&#127976; Hotels',LOGI.hotels.length)}
  </div>`;
  if(MVF.view==='flights') h+=flightsView();
  else if(MVF.view==='transfers') h+=transfersView();
  else h+=hotelsView();
  document.getElementById('view').innerHTML=h;
}
function subBtn(v,label,count){return `<button class="subtab ${MVF.view===v?'active':''}" onclick="mvfView('${v}')">${label}<span class="cnt">${count}</span></button>`;}
function mvfView(v){MVF.view=v;renderMovements();}
function scopeSel(){return `<label class="ctl"><span>Period</span><select class="inp" onchange="mvfScope(this.value)">
  <option value="upcoming" ${MVF.scope==='upcoming'?'selected':''}>Upcoming</option>
  <option value="past" ${MVF.scope==='past'?'selected':''}>Past</option>
  <option value="all" ${MVF.scope==='all'?'selected':''}>All (full log)</option></select></label>`;}
function searchBox(ph){return `<input class="inp" placeholder="${ph}" value="${MVF.q}" oninput="mvfSearch(this.value)" style="width:270px">`;}

/* ----- FLIGHTS ----- */

  return MOVES.filter(m=>inScope(m.date)
    && (MVF.dir==='all'||m.dir===MVF.dir)
    && MVF.depts.has(m.dept)
    && (!q||m.name.toLowerCase().includes(q)||(m.rank||'').toLowerCase().includes(q)||(m.from||'').toLowerCase().includes(q)||(m.to||'').toLowerCase().includes(q)||(m.flight||'').toLowerCase().includes(q)||(m.nat||'').toLowerCase().includes(q)));
}

    ${scopeSel()}
    <label class="ctl"><span>Show</span><select class="inp" onchange="mvfDir(this.value)">
      <option value="all" ${MVF.dir==='all'?'selected':''}>All movements</option>

    <div class="spacer"></div>${searchBox('Search name, port, flight, nationality…')}</div>
    <div class="dash-toolbar" style="margin-top:10px;gap:7px"><span class="ctl-lbl">Departments</span>${DEPT_ORDER.map(d=>`<button class="filter-chip ${MVF.depts.has(d)?'':'off'}" onclick="mvfDept('${d}')"><span class="sw" style="background:${DEPTS[d].raw}"></span>${DEPTS[d].name}</button>`).join('')}</div></div>`;

  for(const m of moves){

    const dirIcon=m.dir==='in'?'<span style="color:var(--mv-in)">&#9660;</span>':'<span style="color:var(--mv-out)">&#9650;</span>';
    const td=docCell(m);
    const imm=m.immReq?'<span class="imm-badge">Required</span>':'<span class="mv-dim">—</span>';
    const pu=m.dir==='out'?(m.pickup||'<span class="pill-tbc">TBC</span>'):'<span class="mv-dim">—</span>';
    h+=`<tr class="mvr ${m.dir}" ${click}>
      <td style="box-shadow:inset 4px 0 0 ${depColor(m.dept)}"><b>${D(m.date).toLocaleDateString('en-GB',{day:'2-digit',month:'short'})}</b></td>

/* ----- HOTELS ----- */

  const q=MVF.q.toLowerCase().trim();
  return LOGI.hotels.filter(x=>inScope(x.checkin)
    && (!q||x.name.toLowerCase().includes(q)||(x.property||'').toLowerCase().includes(q)||(x.comments||'').toLowerCase().includes(q)));
}
function hotelsView(){
  let h=`<div class="card pad" style="margin-bottom:14px"><div class="dash-toolbar">
    ${scopeSel()}<div class="spacer"></div>${searchBox('Search name, hotel, notes…')}</div></div>`;

function mvfScope(v){MVF.scope=v;renderMovements();}
function mvfDir(v){MVF.dir=v;renderMovements();}
function mvfType(v){MVF.type=v;renderMovements();}
function mvfDept(d){MVF.depts.has(d)?MVF.depts.delete(d):MVF.depts.add(d);renderMovements();}
function mvfSearch(v){MVF.q=v;renderMovements();}
function kpi(l,v,m,col){return `<div class="kpi"><span class="bar" style="background:${col}"></span><div class="lab">${l}</div><div class="val">${v}</div><div class="meta">${m}</div></div>`;}
function visibleItin(){const t=TODAY.getTime();return ITIN.slice().filter(e=>entEnd(e).getTime()>=t).sort((a,b)=>entStart(a)-entStart(b));}
function periodItinRibbon(){
  const b=periodBounds();
  const items=ITIN.filter(en=>overlaps(entStart(en).getTime(),entEnd(en).getTime(),b.s.getTime(),b.e.getTime())).sort((a,b2)=>entStart(a)-entStart(b2));
  if(!items.length) return `<div class="pitin none"><span class="pitin-lbl">&#9875; Itinerary</span><span>No port calls or charters in this ${DASH.mode==='week'?'week':'month'}.</span></div>`;
  const chips=items.map(en=>{
    const col=en.kind==='port'?'#13314f':(en.status==='confirmed'?'#9a3667':'#d98324');
    const lab=en.kind==='port'?en.port:en.label;
    const tag=en.kind==='charter'&&en.status==='potential'?' <span class="pitin-pot">option</span>':'';
    return `<span class="pitin-chip" title="${en.kind==='port'?'Port call':('Charter — '+en.status)}: ${fmtShort(entStart(en))} – ${fmtShort(entEnd(en))}"><span class="leg-dot" style="background:${col}"></span>${lab}${tag}<span class="pitin-d">${fmtShort(entStart(en))}–${fmtShort(entEnd(en))}</span></span>`;
  }).join('');
  return `<div class="pitin"><span class="pitin-lbl">&#9875; Itinerary</span>${chips}</div>`;
}
function dashItinStrip(){
  const up=visibleItin(); if(!up.length) return '';
  const t=TODAY.getTime(); let rows='';
  up.slice(0,6).forEach(e=>{
    const s=entStart(e),en=entEnd(e);const now=t>=s.getTime()&&t<=en.getTime();
    const dr=(e.kind==='port'&&(!e.depart||e.depart===e.arrive))?fmtShort(s):fmtShort(s)+' – '+fmtShort(en);
    const col=e.kind==='port'?'#13314f':(e.status==='confirmed'?'#9a3667':'#d98324');
    const main=e.kind==='port'?`${e.port} <span class="muted">&middot; in port</span>`:e.label;
    const chip=e.kind==='charter'?(e.status==='confirmed'?'<span class="chip-conf">Confirmed</span>':'<span class="chip-pot">Potential</span>'):'';
    rows+=`<div class="iti-row${now?' now':''}"><span class="iti-date">${dr}</span><span class="iti-main"><span class="leg-dot" style="background:${col}"></span>${main}${now?' <span class="nowtag">NOW</span>':''}</span><span class="iti-side">${chip}</span></div>`;
  });
  return `<div class="card itin-strip"><div class="itin-strip-head"><span>&#9875; Itinerary</span><button class="itin-close" onclick="toggleItin()" title="Hide itinerary">&times;</button></div><div class="iti-list">${rows}</div></div>`;
}

/* ---- fleet calendar (rotation planner) ---- */
let CAL={zoom:'year',anchor:new Date(TODAY.getTime()),depts:new Set(DEPT_ORDER),rank:'all',q:''};
const isoD=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
function calRanks(){return Array.from(new Set(CREW.map(c=>c.rank))).sort();}
function calCrew(){const q=CAL.q.toLowerCase().trim();return CREW.filter(c=>CAL.depts.has(c.deptKey)&&(CAL.rank==='all'||c.rank===CAL.rank)&&(!q||c.name.toLowerCase().includes(q)||(c.rank||'').toLowerCase().includes(q)));}
function calWin(){
  if(CAL.zoom==='year')return {s:new Date(YEAR,0,1),e:new Date(YEAR,11,31)};
  if(CAL.zoom==='month'){const s=new Date(CAL.anchor.getFullYear(),CAL.anchor.getMonth(),1);return {s,e:new Date(s.getFullYear(),s.getMonth()+1,0)};}
  const s=startOfWeek(CAL.anchor);return {s,e:new Date(s.getFullYear(),s.getMonth(),s.getDate()+6)};
}
function calDays(){const w=calWin();return Math.round((w.e-w.s)/MS)+1;}
function calTLW(){if(CAL.zoom==='year')return 1140;if(CAL.zoom==='month')return calDays()*34;return calDays()*120;}
function pX(date){const w=calWin();const days=calDays();return clamp((date-w.s)/(days*MS)*100,0,100);}
function segGeom(s,e){const w=calWin();const days=calDays();const L=clamp((s-w.s)/(days*MS)*100,0,100);const R=clamp((new Date(e.getTime()+MS)-w.s)/(days*MS)*100,0,100);return {L,W:Math.max(R-L,0.4)};}
function inWin(s,e){const w=calWin();return s.getTime()<=w.e.getTime()&&e.getTime()>=w.s.getTime();}

function calLabel(){const w=calWin();if(CAL.zoom==='year')return `${YEAR} — full year`;if(CAL.zoom==='month')return CAL.anchor.toLocaleDateString('en-GB',{month:'long',year:'numeric'});return `Week of ${fmtShort(w.s)} – ${fmtShort(w.e)}`;}
function calAxis(){
  const w=calWin(),days=calDays();let s='';
  if(CAL.zoom==='year'){for(let m=0;m<12;m++){const left=(new Date(YEAR,m,1)-w.s)/(days*MS)*100;const wd=((new Date(YEAR,m+1,1))-(new Date(YEAR,m,1)))/(days*MS)*100;s+=`<div class="cax" style="left:${left}%;width:${wd}%">${MONTHS[m]}</div>`;}}
  else{for(let i=0;i<days;i++){const d=new Date(w.s.getTime()+i*MS);const left=i/days*100,wd=1/days*100;const wk=d.getDay()===0||d.getDay()===6;
    const lbl=CAL.zoom==='week'?`${['Su','Mo','Tu','We','Th','Fr','Sa'][d.getDay()]}<br>${d.getDate()}`:d.getDate();
    s+=`<div class="cax day${wk?' we':''}" style="left:${left}%;width:${wd}%">${lbl}</div>`;}}
  return s;
}
function calGrid(){
  const w=calWin(),days=calDays();let s='';
  if(CAL.zoom==='year'){for(let m=1;m<12;m++){const left=(new Date(YEAR,m,1)-w.s)/(days*MS)*100;s+=`<div class="cgrid" style="left:${left}%"></div>`;}}
  else{for(let i=1;i<days;i++){const d=new Date(w.s.getTime()+i*MS);const wk=d.getDay()===0||d.getDay()===6;s+=`<div class="cgrid${wk?' we':''}" style="left:${i/days*100}%"></div>`;}}
  return s;
}
function calToday(){const w=calWin();if(TODAY<w.s||TODAY>w.e)return '';return `<div class="ctoday" style="left:${pX(TODAY)}%"></div>`;}
function calBlackouts(){let s='';for(const lo of LOCKOUTS){const a=D(lo.start),b=D(lo.end);if(!inWin(a,b))continue;const g=segGeom(a,b);s+=`<div class="cblk" title="Blackout: ${lo.label} (${fmtShort(a)}–${fmtShort(b)})" style="left:${g.L}%;width:${g.W}%"></div>`;}return s;}
function calItinTL(){
  let s=calGrid()+calBlackouts();
  for(const en of ITIN){const a=entStart(en),b=entEnd(en);if(!inWin(a,b))continue;const g=segGeom(a,b);
    if(en.kind==='charter'){const conf=en.status==='confirmed';const sty=conf?'background:#9a3667;color:#fff':'background:repeating-linear-gradient(45deg,#dcbcca,#dcbcca 4px,#efdde5 4px,#efdde5 8px);color:#7a2350;border:1px dashed #9a3667';
      s+=`<div class="citin-band" title="${en.label} — ${en.status}" style="left:${g.L}%;width:${g.W}%;${sty}">${g.W>6?en.label:''}</div>`;}
    else s+=`<div class="cport" title="${en.port} (${fmtShort(a)}${b>a?'–'+fmtShort(b):''})" style="left:${g.L}%;width:${g.W}%"><span>&#9875; ${CAL.zoom!=='year'?en.port:''}</span></div>`;}
  s+=calToday();
  return s;
}
function calRowTL(c){
  let s=`<div class="cbase"></div>`+calGrid();
  c.events.forEach((e,i)=>{if(!inWin(e.start,e.end))return;const g=segGeom(e.start,e.end);
    s+=`<div class="cseg" title="${e.label}: ${fmtShort(e.start)}–${fmtShort(e.end)} (click to edit)" onclick="event.stopPropagation();openLeaveEditor(${c.id},${i})" style="left:${g.L}%;width:${g.W}%;background:var(${e.c});border-color:var(${e.l})"></div>`;});
  s+=calBlackouts()+calToday();
  return s;
}

function renderCalendar(){
  const tlw=calTLW();
  const list=calCrew();
  let h=`<h2 class="page">Rotation Calendar</h2>`;
  // controls
  h+=`<div class="card pad" style="margin-bottom:12px"><div class="dash-toolbar">
    ${CAL.zoom!=='year'?`<div class="period-nav"><button class="navbtn" onclick="calShift(-1)">&#8249;</button><span class="period-lbl" style="min-width:150px">${calLabel()}</span><button class="navbtn" onclick="calShift(1)">&#8250;</button></div><button class="btn ghost sm" onclick="calToday2()">Today</button>`:`<span class="period-lbl" style="min-width:120px">${calLabel()}</span>`}
    <label class="ctl"><span>View</span><select class="inp" onchange="calZoom(this.value)"><option value="year" ${CAL.zoom==='year'?'selected':''}>Annual</option><option value="month" ${CAL.zoom==='month'?'selected':''}>Monthly</option><option value="week" ${CAL.zoom==='week'?'selected':''}>Weekly</option></select></label>
    <label class="ctl"><span>Rank</span><select class="inp" onchange="calRank(this.value)"><option value="all" ${CAL.rank==='all'?'selected':''}>All ranks</option>${calRanks().map(r=>`<option value="${r.replace(/"/g,'&quot;')}" ${CAL.rank===r?'selected':''}>${r}</option>`).join('')}</select></label>
    <div class="spacer"></div>
    <input class="inp" placeholder="Search name…" value="${CAL.q}" oninput="calSearch(this.value)" style="width:180px">
  </div>
  <div class="dash-toolbar" style="margin-top:10px;gap:7px"><span class="ctl-lbl">Departments</span>${DEPT_ORDER.map(d=>`<button class="filter-chip ${CAL.depts.has(d)?'':'off'}" onclick="calDept('${d}')"><span class="sw" style="background:${DEPTS[d].raw}"></span>${DEPTS[d].name}</button>`).join('')}</div></div>`;
  // legend
  h+=`<div class="card pad" style="margin-bottom:12px"><div class="legend">
    <span class="it"><span class="box" style="background:var(--c-onboard);border-color:var(--l-onboard)"></span>Onboard</span>
    <span class="it"><span class="box" style="background:var(--c-leave);border-color:var(--l-leave)"></span>Leave</span>
    <span class="it"><span class="box" style="background:var(--c-travel);border-color:var(--l-travel)"></span>Travel</span>
    <span class="it"><span class="box" style="background:var(--c-sick);border-color:var(--l-sick)"></span>Sick</span>
    <span class="it"><span class="box hatch"></span>Blackout</span>
    <span class="it"><span class="box" style="background:#9a3667"></span>Charter</span>
    <span class="it"><span class="box" style="background:var(--gold)"></span>Today</span>
    <span class="spacer" style="flex:1"></span>${canEditCrew(list[0]||{deptKey:''})?'<span class="muted" style="font-size:12px">Click a row to add leave · click a bar to edit</span>':'<span class="muted" style="font-size:12px">View only for your role</span>'}
  </div></div>`;
  // calendar grid
  h+=`<div class="card cal-wrap"><div class="cal" style="--tlw:${tlw}px">`;
  h+=`<div class="cal-row cal-head"><div class="cal-name">Crew (${list.length})</div><div class="cal-tl axis">${calAxis()}</div></div>`;
  h+=`<div class="cal-row cal-itin"><div class="cal-name">&#9875; Itinerary</div><div class="cal-tl">${calItinTL()}</div></div>`;
  for(const d of DEPT_ORDER){
    if(!CAL.depts.has(d))continue;
    const ppl=list.filter(c=>c.deptKey===d); if(!ppl.length)continue;
    h+=`<div class="cal-deptrow"><span class="ddot" style="background:${DEPTS[d].raw}"></span>${DEPTS[d].name} <span class="muted">${ppl.length}</span></div>`;
    for(const c of ppl){
      h+=`<div class="cal-row crew"><div class="cal-name" onclick="openCrew(${c.id})"><div class="nm">${c.name}</div><div class="rk">${c.rank}</div></div><div class="cal-tl" onclick="calRowClick(event,${c.id})">${calRowTL(c)}</div></div>`;
    }
  }
  if(!list.length)h+=`<div style="padding:30px;text-align:center;color:var(--muted)">No crew match these filters.</div>`;
  h+=`</div></div>`;
  document.getElementById('view').innerHTML=h;
}
function calZoom(z){if(z!=='year')CAL.anchor=new Date(TODAY.getTime());CAL.zoom=z;renderCalendar();}
function calShift(n){if(CAL.zoom==='month')CAL.anchor.setMonth(CAL.anchor.getMonth()+n);else CAL.anchor.setDate(CAL.anchor.getDate()+7*n);renderCalendar();}
function calToday2(){CAL.anchor=new Date(TODAY.getTime());renderCalendar();}
function calDept(d){CAL.depts.has(d)?CAL.depts.delete(d):CAL.depts.add(d);renderCalendar();}
function calRank(v){CAL.rank=v;renderCalendar();}
function calSearch(v){CAL.q=v;renderCalendar();}

/* editing */
const EDIT_TYPES={L:'Approved Leave',T:'Travel Day',U:'Unpaid Leave',S:'Sick Leave',N:'Not on Payroll',C:'Compassionate'};
function calRowClick(ev,id){const c=CREW.find(x=>x.id===id);if(!c)return;
  if(!canEditCrew(c)){openCrew(id);return;}
  const w=calWin(),days=calDays();const rect=ev.currentTarget.getBoundingClientRect();
  const frac=Math.min(Math.max((ev.clientX-rect.left)/rect.width,0),0.999);
  const day=new Date(w.s.getTime()+Math.floor(frac*days)*MS);
  openLeaveEditor(id,-1,isoD(day));
}
function openLeaveEditor(id,idx,defStart){
  const c=CREW.find(x=>x.id===id);if(!c)return;
  if(!canEditCrew(c)){openCrew(id);return;}
  const ev=idx>=0?c.events[idx]:null;
  const code=ev?ev.code:'L';
  const start=ev?isoD(ev.start):(defStart||isoD(TODAY));
  const end=ev?isoD(ev.end):(defStart||isoD(TODAY));
  const opts=Object.keys(EDIT_TYPES).map(k=>`<option value="${k}" ${code===k?'selected':''}>${EDIT_TYPES[k]}</option>`).join('');
  formModal(idx>=0?`Edit — ${c.name}`:`Add leave — ${c.name}`,`
    <p class="formnote">${c.rank} &middot; ${c.deptKey}</p>
    <div class="field"><label>Type</label><select id="e_code">${opts}</select></div>
    <div class="frow"><div class="field"><label>From</label><input type="date" id="e_start" value="${start}"></div><div class="field"><label>To</label><input type="date" id="e_end" value="${end}"></div></div>
    ${idx>=0?'<button class="btn danger sm" style="margin-top:4px" onclick="deleteLeave('+id+','+idx+')">Delete this entry</button>':''}`,
    ()=>{const k=val('e_code'),s=val('e_start'),e=val('e_end');if(D(e)<D(s)){alert('End is before start.');return false;}
      const cd=CODES[k];const rec={code:k,cat:cd.cat,c:cd.c,l:cd.l,label:cd.label,start:D(s),end:D(e)};
      if(idx>=0)c.events[idx]=rec;else c.events.push(rec);
      closeModal();renderCalendar();});
}
function deleteLeave(id,idx){const c=CREW.find(x=>x.id===id);if(!c)return;c.events.splice(idx,1);closeModal();renderCalendar();}
function legBands(){
  let s='';
  for(const e of ITIN){
    if(e.kind==='charter'){const L=pctX(D(e.start));const W=pctX(new Date(D(e.end).getTime()+MS))-L;const conf=e.status==='confirmed';
      const sty=conf?'background:#9a3667;color:#fff':'background:repeating-linear-gradient(45deg,#dcbcca,#dcbcca 4px,#efdde5 4px,#efdde5 8px);color:#7a2350;border:1px dashed #9a3667';
      s+=`<div class="leg-band" title="${e.label} (${fmtShort(D(e.start))}–${fmtShort(D(e.end))}) — ${e.status}" style="left:${L}%;width:${Math.max(W,0.5)}%;${sty}">${W>7?e.label:''}</div>`;}
    else {const L=pctX(D(e.arrive));s+=`<div class="port-mark" title="${e.port} (${fmtShort(D(e.arrive))}${e.depart&&e.depart!==e.arrive?'–'+fmtShort(D(e.depart)):''})" style="left:${L}%">&#9875;</div>`;}
  }
  return s;
}

      <a class="btn ghost sm" href="#" onclick="return clEmail()">&#9993; Email</a>

  h+=`</tbody></table></div><p class="footnote">Passport &amp; personal data shown for the official crew list. Use “View / Print” for the flag-state format you can save, email or print.</p>`;

function statusTag(cat){const line=CAT_LINE[cat];return `<span class="tag" style="background:var(${line})1f;color:var(${line})"><span class="sw" style="background:var(${line})"></span>${CAT_LABEL[cat]}</span>`;}
function owedCell(c){const v=num(c.owed);if(v===null)return '—';const col=v<0?'#cf3b6b':v>40?'#d99a2b':'#3a9d56';return `<b style="color:${col}">${v}</b>`;}

/* ---- balances ---- */
function renderBalances(){
  let h=`<h2 class="page">Leave Balances</h2><p class="page-sub">Entitlement, leave taken to date and leave days owed — as recorded in the planner, at ${fmt(TODAY)}.</p>`;
  h+=filterBar();
  h+=`<div class="card" style="overflow:hidden"><table class="data"><thead><tr><th onclick="setSort('name')">Crew</th><th onclick="setSort('deptKey')">Dept</th><th onclick="setSort('rank')">Rank</th><th onclick="setSort('entitlement')">Entitlement</th><th onclick="setSort('taken')">Leave taken YTD</th><th onclick="setSort('owed')">Days owed</th><th onclick="setSort('flights')">Flights</th><th>&nbsp;</th></tr></thead><tbody>`;
  let rows=visibleCrew().map(c=>({c,name:c.name,deptKey:c.deptKey,rank:c.rank,entitlement:num(c.entitlement),taken:leaveDaysTaken(c),owed:num(c.owed),flights:num(c.flights)}));
  rows.sort((x,y)=>{let A=x[SORT.key],B=y[SORT.key];if(A==null)A=-1e9;if(B==null)B=-1e9;return typeof A==='string'?A.localeCompare(B)*SORT.dir:(A-B)*SORT.dir;});
  for(const r of rows){const c=r.c,owed=r.owed;let balCell='—';
    if(owed!==null){const ent=r.entitlement||Math.max(owed,1);const pct=clamp(owed/ent*100,0,100);const col=owed<0?'#cf3b6b':owed>40?'#d99a2b':'#3a9d56';balCell=`<b style="color:${col}">${owed} d</b><div class="balbar"><i style="width:${pct}%;background:${col}"></i></div>`;}
    h+=`<tr class="clk" onclick="openCrew(${c.id})"><td><b style="color:var(--navy)">${c.name}</b></td><td><span class="statusdot" style="background:${DEPTS[c.deptKey].raw}"></span>${DEPTS[c.deptKey].name}</td><td>${c.rank}</td><td>${r.entitlement!=null?r.entitlement+' d':'—'}</td><td>${r.taken} d</td><td>${balCell}</td><td>${r.flights!=null?r.flights:'—'}</td><td style="text-align:right">${canEditCrew(c)?'<span style="color:var(--gold);font-weight:700">&#9998;</span>':'<span style="color:#cbd5e1">&#128274;</span>'}</td></tr>`;}
  h+=`</tbody></table></div>`;
  h+=`<p class="footnote">&#9998; = editable (your department). &#128274; = view-only. "Days owed" is the balance carried in your workbook; "leave taken YTD" counts approved-leave (L) days up to today.</p>`;
  document.getElementById('view').innerHTML=h;
}
function setSort(k){if(SORT.key===k)SORT.dir*=-1;else{SORT.key=k;SORT.dir=1;}renderBalances();}

/* ---- itinerary & blackouts ---- */
function renderItinerary(){
  const canI=canEditItinerary(), canB=canEditBlackouts();
  let h=`<h2 class="page">Itinerary &amp; Blackouts ${YEAR}</h2><p class="page-sub">Day-to-day confirmed itinerary — port calls, confirmed charters and potential (held) charters. Maintained by the Bridge or Purser. Blackout windows are set by the Purser.</p>`;
  h+=`<div class="card pad" style="margin-bottom:16px"><div class="gantt-wrap"><div style="position:relative;height:34px;min-width:1000px;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fbfcfe">${monthGrid()}${legBands()}${lockoutBands(true)}${todayMarker()}</div></div><div class="monthaxis" style="min-width:1000px;height:22px;margin-top:2px;position:relative">${monthAxisDark()}</div></div>`;
  h+=`<div class="card pad" style="margin-bottom:16px"><div class="sechead"><h3>Day-to-Day Itinerary</h3>${canI?'<div style="display:flex;gap:6px"><button class="btn ghost sm" onclick="openPortEditor(-1)">&#43; Port call</button><button class="btn primary sm" onclick="openCharterEditor(-1)">&#43; Charter</button></div>':'<span class="badge-lock">&#128274; Bridge / Purser only</span>'}</div>`;
  h+=`<table class="data"><thead><tr><th>Dates</th><th>Type</th><th>Detail</th><th>Status</th>${canI?'<th></th>':''}</tr></thead><tbody>`;
  ITIN.slice().sort((a,b)=>entStart(a)-entStart(b)).forEach(e=>{const idx=ITIN.indexOf(e);const s=entStart(e),en=entEnd(e);const now=TODAY>=s&&TODAY<=en;const past=en.getTime()<TODAY.getTime();
    const dates=(e.kind==='port'&&(!e.depart||e.depart===e.arrive))?fmtShort(s):fmtShort(s)+' – '+fmtShort(en);
    const type=e.kind==='port'?'<span class="tag" style="background:#13314f1a;color:#13314f"><span class="sw" style="background:#13314f"></span>Port call</span>':'<span class="tag" style="background:#9a36671a;color:#9a3667"><span class="sw" style="background:#9a3667"></span>Charter</span>';
    const detail=e.kind==='port'?e.port:e.label;
    const status=e.kind==='port'?'<span class="muted">In port</span>':(e.status==='confirmed'?'<span class="chip-conf">Confirmed</span>':'<span class="chip-pot">Potential</span>');
    const rowsty=now?'background:#fff7e6':(past?'opacity:.5':'');
    h+=`<tr style="${rowsty}"><td><b style="color:var(--navy)">${dates}</b>${now?' <span class="nowtag">NOW</span>':''}</td><td>${type}</td><td>${detail}</td><td>${status}</td>${canI?`<td style="text-align:right;white-space:nowrap"><button class="btn ghost sm" onclick="${e.kind==='port'?`openPortEditor(${idx})`:`openCharterEditor(${idx})`}">Edit</button> <button class="btn danger sm" onclick="deleteEntry(${idx})">Delete</button></td>`:''}</tr>`;});
  h+=`</tbody></table><p class="footnote">Confirmed charters are firm bookings; potential charters are held options / enquiries. Completed dates dim automatically.</p></div>`;
  h+=`<div class="card pad"><div class="sechead"><h3>&#128274; Blackout Windows — no swap-outs allowed</h3>${canB?'<button class="btn primary sm" onclick="openLockoutEditor(-1)">&#43; Add blackout</button>':'<span class="badge-lock">&#128274; Purser only</span>'}</div>`;
  if(!LOCKOUTS.length)h+=`<div style="color:var(--muted);font-size:13px">No blackout windows set.</div>`;

function tripCard(c,m,active){

    <div class="frow"><div class="field"><label>From</label><input type="date" id="l_start" value="2026-09-01"></div><div class="field"><label>To</label><input type="date" id="l_end" value="2026-09-14"></div></div>
    <div class="field"><label>Note (optional)</label><input id="l_note" placeholder="Anything to add"></div>`,
    ()=>{const c=crewMe();REQ.push({id:_rid++,crewId:c.id,crewName:c.name,dept:c.deptKey,type:'leave',start:val('l_start'),end:val('l_end'),reason:val('l_note').trim(),status:'Submitted'});
      updateReqBadge();closeModal();renderCrewApp();});
}
function crewIssueForm(){
  formModal('Flag an issue',`
    <p class="formnote">Sent to the Purser.</p>
    <div class="field"><label>What's the issue?</label><input id="i_text" placeholder="e.g. flight time clashes with watch"></div>`,
    ()=>{const c=crewMe();const tx=val('i_text').trim();if(!tx){alert('Please describe the issue.');return false;}
      REQ.push({id:_rid++,crewId:c.id,crewName:c.name,dept:c.deptKey,type:'issue',text:tx,status:'Submitted'});
      updateReqBadge();closeModal();renderCrewApp();});
}

/* ===================== MANAGEMENT: REQUESTS / APPROVALS ===================== */
function pendingCount(){return ORT.filter(o=>o.status==='Pending HOD'||o.status==='HOD Approved').length + REQ.filter(r=>r.status==='Submitted').length;}
function updateReqBadge(){const b=document.getElementById('reqBadge');if(!b)return;const n=pendingCount();b.textContent=n||'';b.style.display=n?'inline-flex':'none';}
function canActHOD(o){return SESSION.role==='captain'||SESSION.role==='purser'||(SESSION.role&&SESSION.role.indexOf('hod')===0&&SESSION.dept===o.dept);}
function isCaptainish(){return SESSION.role==='captain'||SESSION.role==='purser';}
function approveORT(id,stage){const o=ORT.find(x=>x.id===id);if(!o)return;const who=ROLE_LABEL[SESSION.role]||'Management';
  if(stage==='hod'){o.status='HOD Approved';o.hodBy=who;o.hist.push('Approved by '+who+' (HOD) '+fmt(TODAY));}
  else{o.status='Approved';o.capBy=who;o.hist.push('Approved by '+who+' '+fmt(TODAY));}
  updateReqBadge();renderRequests();}
function declineORT(id){const o=ORT.find(x=>x.id===id);if(!o)return;o.status='Declined';o.hist.push('Declined by '+(ROLE_LABEL[SESSION.role]||'Management')+' '+fmt(TODAY));updateReqBadge();renderRequests();}
function handleReq(id){const r=REQ.find(x=>x.id===id);if(!r)return;r.status='Handled';updateReqBadge();renderRequests();}
function renderRequests(){
  let h=`<h2 class="page">Requests &amp; Approvals</h2><p class="page-sub">Crew leave requests, flagged issues and Off-Route Travel (ORT) approvals. ORT routes to the department HOD, then the Captain.</p>`;
  // ORT
  h+=`<div class="card pad" style="margin-bottom:16px"><div class="sechead"><h3>&#9992; Off-Route Travel (ORT)</h3><span class="ctl-lbl">${ORT.length} total</span></div>`;
  if(!ORT.length)h+=`<div style="color:var(--muted);font-size:13px">No ORT requests.</div>`;
  ORT.slice().sort((a,b)=>b.id-a.id).forEach(o=>{
    let act='';
    if(o.status==='Pending HOD'&&canActHOD(o))act=`<button class="btn primary sm" onclick="approveORT(${o.id},'hod')">Approve as HOD</button> <button class="btn danger sm" onclick="declineORT(${o.id})">Decline</button>`;
    else if(o.status==='HOD Approved'&&isCaptainish())act=`<button class="btn primary sm" onclick="approveORT(${o.id},'cap')">Approve (Captain)</button> <button class="btn danger sm" onclick="declineORT(${o.id})">Decline</button>`;
    h+=`<div class="appcard"><div class="appmain"><div class="apptitle"><span class="ddot" style="background:${depColor(o.dept)}"></span><b>${o.crewName}</b> <span class="mv-dim">&middot; ${o.dept}</span></div>
      <div class="appsub">${o.dest} &middot; ${fmtShort(D(o.start))}–${fmtShort(D(o.end))}</div>
      ${o.reason?`<div class="appreason">${o.reason}</div>`:''}
      <div class="apphist">${(o.hist||[]).join(' › ')}</div></div>
      <div class="appside">${statusChip(o.status)}<div class="appact">${act}</div></div></div>`;
  });
  h+=`</div>`;
  // leave + issues
  const subs=REQ.slice().sort((a,b)=>b.id-a.id);
  h+=`<div class="card pad"><div class="sechead"><h3>&#9993; Crew Requests &amp; Issues</h3><span class="ctl-lbl">${subs.length} total</span></div>`;
  if(!subs.length)h+=`<div style="color:var(--muted);font-size:13px">No requests.</div>`;
  subs.forEach(r=>{
    const title=r.type==='leave'?`Leave request &middot; ${fmtShort(D(r.start))}–${fmtShort(D(r.end))}`:`Issue flagged`;
    const act=(isCaptainish()&&r.status==='Submitted')?`<button class="btn ghost sm" onclick="handleReq(${r.id})">Mark handled</button>`:'';
    h+=`<div class="appcard"><div class="appmain"><div class="apptitle"><span class="ddot" style="background:${depColor(r.dept)}"></span><b>${r.crewName}</b> <span class="mv-dim">&middot; ${r.dept}</span></div>
      <div class="appsub">${title}</div>${(r.reason||r.text)?`<div class="appreason">${r.reason||r.text}</div>`:''}</div>
      <div class="appside">${statusChip(r.status)}<div class="appact">${act}</div></div></div>`;
  });
  h+=`</div>`;
  document.getElementById('view').innerHTML=h;
}

/* ---- CREW LIST DATA + OFFICIAL LIST (print/save/email) ---- */
let CLV={onboardOnly:true};
const clToks=s=>(s||'').toLowerCase().replace(/[^a-z ]/g,' ').split(/\s+/).filter(Boolean);
function clPairMatch(crewName,p){const toks=clToks(crewName);const last=clToks(p.last),first=clToks(p.first);return last.length&&last.every(x=>toks.includes(x))&&first.length&&toks.includes(first[0]);}
function clMatch(p){return CREW.find(x=>clPairMatch(x.name,p))||null;}
function clForCrew(c){return (CLIST.crew||[]).find(p=>clPairMatch(c.name,p))||null;}
function clIsOnboard(p){const c=clMatch(p);return c?statusOn(c)==='onboard':true;}
function clRows(){return (CLIST.crew||[]).filter(p=>!CLV.onboardOnly||clIsOnboard(p));}
function clPort(which){
  const t=TODAY.getTime();const ports=ITIN.filter(e=>e.kind==='port');
  if(which==='last'){const past=ports.filter(e=>D(e.depart||e.arrive).getTime()<=t).sort((a,b)=>D(b.depart||b.arrive)-D(a.depart||a.arrive));return past[0]||null;}
  const fut=ports.filter(e=>D(e.arrive).getTime()>=t).sort((a,b)=>D(a.arrive)-D(b.arrive));return fut[0]||null;
}
function officialSheetHTML(){
  const rows=clRows();const V=CLIST.vessel||{};const paxN=rows.length;
  const lastP=clPort('last'),nextP=clPort('next');
  const today=TODAY.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  let h=`<div class="cl-sheet" id="clSheet">
    <div class="cl-hd"><div class="cl-vessel">M.Y. Renaissance</div><div class="cl-doc">CREW LIST</div></div>
    <table class="cl-meta"><tbody>
      <tr><td class="k" colspan="6">Owner / Address</td><td class="k" colspan="2">Pages</td></tr>
      <tr><td colspan="6">${V.owner||''}</td><td colspan="2">1</td></tr>
      <tr><td class="k" colspan="2">1.1 Ship name</td><td class="k" colspan="2">1.2. IMO Number</td><td class="k" colspan="2">1.3. Call Sign</td><td class="k" colspan="2">4. Flag</td></tr>
      <tr><td colspan="2">${V.name||''}</td><td colspan="2">${V.imo||''}</td><td colspan="2">${V.callsign||''}</td><td colspan="2">${V.flag||''}</td></tr>
    </tbody></table>
    <table class="cl-voy"><tbody>
      <tr><td class="k">Arrival Port:</td><td><input class="cl-in" value="${nextP?nextP.port:''}"></td><td class="k">Arrival Date:</td><td><input class="cl-in" value="${nextP?fmtShort(D(nextP.arrive)):''}"></td></tr>
      <tr><td class="k">Arrival Time:</td><td><input class="cl-in" value="09:00"></td><td class="k">Sailing Date:</td><td><input class="cl-in" value="${nextP?fmtShort(D(nextP.depart||nextP.arrive)):''}"></td></tr>
      <tr><td class="k">Last Port of call:</td><td><input class="cl-in" value="${lastP?lastP.port:''}"></td><td class="k">Sailing Time:</td><td><input class="cl-in" value=""></td></tr>
      <tr><td class="k">Next Port of call:</td><td><input class="cl-in" value="${nextP?nextP.port:''}"></td><td class="k">Total PAX:</td><td><b>${paxN}</b></td></tr>
    </tbody></table>
    <table class="cl-tbl"><thead><tr>
      <th>#</th><th>Last Name</th><th>First Name</th><th>Rank</th><th>Nat.</th><th>Sex</th><th>Passport No.</th><th>Place of Birth</th><th>Date of Issue</th><th>Date of Expiry</th><th>Date of Birth</th>
    </tr></thead><tbody>`;
  rows.forEach((p,i)=>{h+=`<tr><td>${String(i+1).padStart(2,'0')}</td><td>${p.last||''}</td><td>${p.first||''}</td><td>${p.rank||''}</td><td>${p.nat||''}</td><td>${p.sex||''}</td><td>${p.passport||''}</td><td>${p.pob||''}</td><td>${p.issue||''}</td><td>${p.expiry||''}</td><td>${p.dob||''}</td></tr>`;});
  if(!rows.length)h+=`<tr><td colspan="11" style="padding:20px;text-align:center;color:#666">No crew onboard.</td></tr>`;
  h+=`</tbody></table>
    <div class="cl-sign"><div class="cl-sign-lbl">1.4. Date and Signature by Captain, authorized agent or officer</div><div class="cl-sign-row"><span class="cl-date">${today}</span><span class="cl-line"></span></div></div>
  </div>`;
  return h;
}
function openOfficialList(){renderOfficial();}
function renderOfficial(){
  const n=clRows().length;
  document.getElementById('modalMount').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal of-modal" style="width:1140px;max-width:97vw">
    <div class="of-actions"><div class="of-ttl">&#128203; Official Crew List &middot; ${CLV.onboardOnly?n+' onboard':n+' crew'}</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <label class="ctl"><span>Show</span><select class="inp" onchange="clSetView(this.value)"><option value="on" ${CLV.onboardOnly?'selected':''}>Onboard now</option><option value="all" ${!CLV.onboardOnly?'selected':''}>All crew</option></select></label>
        <button class="btn ghost sm" onclick="clDownloadCSV()">&#8681; CSV</button>
        <a class="btn ghost sm" href="#" onclick="return clEmail()">&#9993; Email</a>
        <button class="btn primary sm" onclick="window.print()">&#128424; Print / Save PDF</button>
        <button class="btn ghost sm" onclick="closeModal()">Close</button>
      </div></div>
    <div class="of-body">${officialSheetHTML()}</div>
  </div></div>`;
}
function clSetView(v){CLV.onboardOnly=(v==='on');renderOfficial();}
function clEmail(){
  const n=clRows().length;const d=TODAY.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  const subj=encodeURIComponent(`M/Y Renaissance — Crew List (${d})`);
  const body=encodeURIComponent(`Please find the current M/Y Renaissance crew list.\n\nTotal onboard: ${n}\nAs at: ${d}\n\n(Use Print / Save PDF to attach the formatted crew list.)`);
  window.location.href=`mailto:?subject=${subj}&body=${body}`;return false;
}
function clDownloadCSV(){
  const rows=clRows();
  const head=["#","Last Name","First Name","Rank","Nationality","Sex","Passport No.","Place of Birth","Date of Issue","Date of Expiry","Date of Birth"];
  const esc=s=>`"${String(s||'').replace(/"/g,'""')}"`;
  let csv=head.map(esc).join(',')+"\n";
  rows.forEach((p,i)=>{csv+=[String(i+1).padStart(2,'0'),p.last,p.first,p.rank,p.nat,p.sex,p.passport,p.pob,p.issue,p.expiry,p.dob].map(esc).join(',')+"\n";});
  const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`MY_Renaissance_CrewList_${isoD(TODAY)}.csv`;document.body.appendChild(a);a.click();a.remove();
}
buildCrew();
populateCrewPick();
seedRequests();
</script>
